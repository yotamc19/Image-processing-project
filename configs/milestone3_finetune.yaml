# Milestone 3 — final fine-tuning of the STN-CRNN.
# Initialises from the M2 best model and continues at a 10x-lower learning rate
# for a short schedule (the "fine-tuning" stage of the project plan).
data:
  img_height: 32
  img_width: 128
  batch_size: 64
  num_workers: 2
  augment: true

model:
  cnn_out_channels: 512
  rnn_hidden: 256
  rnn_layers: 2
  dropout: 0.3
  use_stn: true

training:
  init_from: "checkpoints_m2/best_model.pt"   # M2 best model (regenerated by the M3 notebook if absent)
  epochs: 15
  lr: 0.0001                                   # 10x lower than baseline — fine-tuning, not from-scratch
  lr_scheduler: "step"
  step_size: 8
  gamma: 0.1
  clip_grad: 5.0
  early_stop_patience: 5

eval:
  beam_width: 1
