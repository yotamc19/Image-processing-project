# Fast sanity run for the M3 fine-tuning pipeline (~1-2 min).
# Fine-tunes from the smoke M2 checkpoint on a small subset for a few epochs.
data:
  img_height: 32
  img_width: 128
  batch_size: 64
  num_workers: 2
  max_train_samples: 2000
  max_eval_samples: 500
  augment: true

model:
  cnn_out_channels: 512
  rnn_hidden: 256
  rnn_layers: 2
  dropout: 0.3
  use_stn: true

training:
  init_from: "checkpoints_m2/best_model.pt"
  epochs: 3
  lr: 0.0001
  lr_scheduler: "step"
  step_size: 8
  gamma: 0.1
  clip_grad: 5.0
  early_stop_patience: 5

eval:
  beam_width: 1
