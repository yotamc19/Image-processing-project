# Fast end-to-end sanity run — verifies the full pipeline in ~2-3 min on a T4.
# Not a real baseline: trains on a small subset for a few epochs.
data:
  img_height: 32
  img_width: 128
  batch_size: 64
  num_workers: 2
  max_train_samples: 2000
  max_eval_samples: 500

model:
  cnn_out_channels: 512
  rnn_hidden: 256
  rnn_layers: 2
  dropout: 0.3

training:
  epochs: 3
  lr: 0.001
  lr_scheduler: "step"
  step_size: 15
  gamma: 0.1
  clip_grad: 5.0
  early_stop_patience: 10

eval:
  beam_width: 1
